services:
  redis-vecdb:
    image: redis/redis-stack:latest
    container_name: redis-vector-db
    ports:
      - "6379:6379"   # Standard Redis port
      - "8001:8001"   # RedisInsight GUI
    environment:
      - REDIS_ARGS=--save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data: